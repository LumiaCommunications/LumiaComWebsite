<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumia Cloud | Redirecting...</title>
    <meta http-equiv="refresh" content="5;url=https://sites.google.com/view/lumiacloud?usp=sharing">
    <style>
        body {
            background: linear-gradient(135deg, #0046ad 0%, #8c30f5 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { font-size: 16px; opacity: 0.9; line-height: 1.5; }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #ffffff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a { color: #00d4ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lumia Cloud</h1>
        <div class="loader"></div>
        <p>We are working hard to build our website!</p>
        <p>Please wait while we transfer you to our temporary site...</p>
        <p style="font-size: 12px; margin-top: 20px;">
            Not redirecting? <a href="https://sites.google.com/view/lumiacloud?usp=sharing">Click here</a>
        </p>
    </div>

</body>
</html>
